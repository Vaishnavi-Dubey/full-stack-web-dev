<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Layouts: Flexbox & Grid</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
        }

        /* --- Flexbox Section --- */
        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 40px;
        }

        .flex-item {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 5px;
            width: 100px;
            text-align: center;
        }

        /* --- Grid Section --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .grid-item {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 40px;
            border-radius: 12px;
            transition: transform 0.2s;
            text-align: center;
            font-weight: bold;
            color: var(--dark);
        }

        .grid-item:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        h2 { color: var(--dark); border-left: 5px solid var(--primary); padding-left: 10px; }
    </style>
</head>
<body>

    <h2>1. Flexbox Navigation/Layout</h2>
    <div class="flex-container">
        <div class="flex-item">Home</div>
        <div class="flex-item">About</div>
        <div class="flex-item">Projects</div>
        <div class="flex-item">Contact</div>
    </div>

    <h2>2. CSS Grid Responsive Dashboard</h2>
    <div class="grid-container">
        <div class="grid-item">Stats 📈</div>
        <div class="grid-item">Users 👥</div>
        <div class="grid-item">Sales 💰</div>
        <div class="grid-item">Tasks ✅</div>
        <div class="grid-item">Revenue 💎</div>
        <div class="grid-item">Growth 🚀</div>
    </div>

</body>
</html>
