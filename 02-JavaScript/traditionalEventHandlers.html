<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traditional Event Handlers</title>
    <style>
      /*----------------------------------
        BASIC LAYOUT & STYLING
      ----------------------------------*/
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #f2f6ff;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        margin-bottom: 20px;
        color: #2c3e50;
      }

      .section {
        background: white;
        padding: 25px 30px;
        margin: 15px 0;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        width: 90%;
        max-width: 500px;
      }

      .section h2 {
        margin-bottom: 15px;
        color: #34495e;
        font-size: 20px;
        border-bottom: 2px solid #3498db;
        padding-bottom: 8px;
      }

      button {
        margin: 5px;
        padding: 10px 20px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #2980b9;
      }

      .hover-box {
        margin-top: 10px;
        padding: 15px;
        background-color: #ecf0f1;
        border: 2px dashed #95a5a6;
        border-radius: 10px;
        text-align: center;
        transition: background-color 0.3s;
      }

      .hover-box.active {
        background-color: #ffeaa7;
        border-color: #f39c12;
      }

      input[type="text"] {
        padding: 8px 12px;
        width: 100%;
        margin-top: 8px;
        font-size: 15px;
        border-radius: 6px;
        border: 1px solid #bdc3c7;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
      }

      .log {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
        background-color: #f4f6f8;
        padding: 10px;
        border-radius: 8px;
        min-height: 40px;
      }
    </style>
  </head>

  <body>
    <h1>Traditional Event Handlers Demo</h1>

    <!-- MOUSE EVENTS -->
    <div class="section">
      <h2>Mouse Events</h2>
      <button id="clickBtn">Click Me!</button>
      <button id="dblClickBtn">Double Click Me!</button>
      <div class="hover-box" id="hoverBox">Hover over me!</div>
      <div class="log" id="mouseLog">Mouse log will appear here...</div>
    </div>

    <!-- KEYBOARD EVENTS -->
    <div class="section">
      <h2>Keyboard Events</h2>
      <input
        id="keyInput"
        type="text"
        placeholder="Type something to trigger key events..."
      />
      <div class="log" id="keyLog">Keyboard log will appear here...</div>
    </div>

    <!-- FORM EVENTS -->
    <div class="section">
      <h2>Form Events</h2>
      <form id="sampleForm">
        <input
          id="formInput"
          type="text"
          placeholder="Enter your name here..."
        />
        <button type="submit">Submit</button>
      </form>
      <div class="log" id="formLog">Form log will appear here...</div>
    </div>

    <script>
      /*//
        Traditional Event Handlers
        -------------------------------------------
        Instead of inline (HTML) event attributes,
        we select elements in JS and assign events
        using .onclick, .onmouseover, etc.
      //*/

      // Accessing log elements for visual feedback
      const mouseLog = document.getElementById("mouseLog");
      const keyLog = document.getElementById("keyLog");
      const formLog = document.getElementById("formLog");
      const hoverBox = document.getElementById("hoverBox");

      //------------------ MOUSE EVENTS ------------------//

      // Select button and assign click handler
      document.getElementById("clickBtn").onclick = function () {
        console.log("Click event fired");
        mouseLog.textContent = "Button clicked!";
      };

      // Select button and assign double click handler
      document.getElementById("dblClickBtn").ondblclick = function () {
        console.log("Double Click event fired");
        mouseLog.textContent = "Button double-clicked!";
      };

      // Mouse over handler for div
      document.getElementById("hoverBox").onmouseover = function () {
        console.log("Mouse Over event fired");
        hoverBox.classList.add("active");
        mouseLog.textContent = "Mouse entered the box!";
      };

      // Mouse out handler for div
      document.getElementById("hoverBox").onmouseout = function () {
        console.log("Mouse Out event fired");
        hoverBox.classList.remove("active");
        mouseLog.textContent = "Mouse left the box!";
      };

      //------------------ KEYBOARD EVENTS ------------------//

      const keyInput = document.getElementById("keyInput");

      // When key is pressed down
      keyInput.onkeydown = function (e) {
        console.log("Key Down:", e.key);
        keyLog.textContent = `Key Down: ${e.key}`;
      };

      // When key is released
      keyInput.onkeyup = function (e) {
        console.log("Key Up:", e.key);
        keyLog.textContent = `Key Up: ${e.key}`;
      };

      // When key is pressed (deprecated in modern JS but for demo)
      keyInput.onkeypress = function (e) {
        console.log("Key Press:", e.key);
        keyLog.textContent = `Key Press: ${e.key}`;
      };

      //------------------ FORM EVENTS ------------------//

      const form = document.getElementById("sampleForm");
      const formInput = document.getElementById("formInput");

      // On form submit
      form.onsubmit = function (e) {
        e.preventDefault(); // Prevent reload
        console.log("Form submitted");
        formLog.textContent = `Form submitted with: ${formInput.value}`;
      };

      // On focus (when user enters input)
      formInput.onfocus = function () {
        console.log("Input Focused");
        formLog.textContent = "Input field is focused!";
      };

      // On blur (when user leaves input)
      formInput.onblur = function () {
        console.log("Input blurred");
        formLog.textContent = "Input field lost focus.";
      };
    </script>
  </body>
</html>
