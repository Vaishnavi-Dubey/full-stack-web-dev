<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreateElement & AppendChild Demo</title>

    <style>
      /* ===== Basic Styling ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: #f4f7fc;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
      }

      h1 {
        color: #2c3e50;
        margin-bottom: 20px;
      }

      .container {
        background: white;
        width: 90%;
        max-width: 500px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      #container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .task {
        background-color: #ecf0f1;
        padding: 12px 15px;
        border-left: 5px solid #3498db;
        border-radius: 8px;
        font-size: 16px;
        color: #2c3e50;
        transition: background-color 0.3s;
      }

      .task:hover {
        background-color: #d6eaf8;
      }

      .controls {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #bdc3c7;
      }

      button {
        padding: 10px 18px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #2980b9;
      }
    </style>
  </head>
  <body>
    <h1>📝 Dynamic To-Do List (createElement + appendChild)</h1>

    <div class="container">
      <div class="controls">
        <input type="text" id="taskInput" placeholder="Enter a new task..." />
        <button id="addBtn">Add Task</button>
      </div>

      <!-- Where tasks will appear -->
      <div id="container">
        <p style="color: #7f8c8d">Tasks will appear here...</p>
      </div>
    </div>

    <script>
      //DOM SELECTION

      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const container = document.getElementById("container");

      //FUNCTION: CREATE A NEW TASK

      function createTask(newTask) {
        //  Create a new <div> element for the task
        const taskElement = document.createElement("div"); // Creates an empty <div>
        //  Add a class for styling
        taskElement.setAttribute("class", "task");
        // Alternatively: taskElement.className = "task";

        //  Create a text node (safe for user text)
        const taskTextNode = document.createTextNode(newTask);

        //  Append the text node inside the div
        taskElement.appendChild(taskTextNode);

        //  Append the task element into the container
        container.appendChild(taskElement);

        console.log("Task added:", taskElement);
      }

      //EVENT LISTENER FOR ADD BUTTON

      addBtn.addEventListener("click", () => {
        const taskName = taskInput.value.trim();

        if (taskName === "") {
          alert("Please enter a task name!");
          return;
        }

        // Call our function to create and append
        createTask(taskName);

        // Clear the input
        taskInput.value = "";
        taskInput.focus();
      });

      //INITIAL EXAMPLES (STATIC CALLS)

      createTask("Programming");
      createTask("Go shopping");
      createTask("Meeting");
      createTask("Studying");
    </script>
  </body>
</html>
